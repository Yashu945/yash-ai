<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask Yash — AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #08080c;
      --surface:       rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.07);
      --border-hi:     rgba(255,255,255,0.12);
      --accent:        #7c3aed;
      --accent-glow:   rgba(124,58,237,0.35);
      --accent-dim:    rgba(124,58,237,0.1);
      --online:        #22c55e;
      --t1:            #f4f4f5;
      --t2:            #a1a1aa;
      --t3:            #3f3f46;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      background-image:
        radial-gradient(ellipse 80% 45% at 50% -10%, rgba(124,58,237,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 85% 85%, rgba(124,58,237,0.06) 0%, transparent 50%);
    }

    /* ─── Card ─── */
    #app {
      width: 100%;
      max-width: 640px;
      height: min(90vh, 780px);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(11,11,17,0.88);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.025),
        0 40px 90px rgba(0,0,0,0.65),
        0 0 120px rgba(124,58,237,0.07);
    }

    /* ─── Header ─── */
    .header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 13px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.015);
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hi);
      overflow: hidden;
      background: linear-gradient(135deg, #4c1d95, #6d28d9);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .status-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--online);
      border: 2.5px solid var(--bg);
      box-shadow: 0 0 8px rgba(34,197,94,0.7);
    }

    .header-info { flex: 1; min-width: 0; }
    .header-info h1 {
      font-size: 14.5px;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--t1);
    }
    .header-info p {
      font-size: 11.5px;
      color: var(--t2);
      margin-top: 2px;
      letter-spacing: -0.005em;
    }
    #status-line { transition: color 0.4s; }

    .header-tags { display: flex; gap: 5px; flex-shrink: 0; }
    .tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--t2);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    /* ─── Messages ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      max-width: 80%;
      animation: popIn 0.24s cubic-bezier(0.34,1.45,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .msg.user { margin-left: auto; flex-direction: row-reverse; }

    .msg-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, #4c1d95, #6d28d9);
    }
    .msg-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .msg.user .msg-icon {
      background: var(--accent-dim);
      border-color: var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.65;
      letter-spacing: -0.008em;
      color: var(--t1);
    }
    .msg.bot .bubble {
      background: rgba(255,255,255,0.047);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--accent);
      border: 1px solid rgba(139,92,246,0.45);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    /* ─── Typing indicator ─── */
    .typing-row {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      animation: popIn 0.2s ease both;
    }
    .typing-bubble {
      background: rgba(255,255,255,0.047);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--t3);
      animation: blink 1.35s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink {
      0%,60%,100% { opacity: 0.25; transform: scale(1);    }
      30%          { opacity: 1;    transform: scale(1.3);  }
    }

    /* ─── Chips ─── */
    .chips {
      padding: 0 22px 15px;
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .chip {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--t2);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.14s, background 0.14s, border-color 0.14s, transform 0.14s;
      white-space: nowrap;
    }
    .chip:hover {
      color: var(--t1);
      background: var(--surface-hover);
      border-color: var(--border-hi);
      transform: translateY(-1px);
    }

    /* ─── Input bar ─── */
    .input-bar {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 9px;
      align-items: center;
      background: rgba(255,255,255,0.015);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      color: var(--t1);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      letter-spacing: -0.008em;
    }
    #chat-input::placeholder { color: var(--t3); }
    #chat-input:focus {
      border-color: var(--accent-glow);
      background: var(--accent-dim);
    }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.14s, transform 0.12s;
      box-shadow: 0 2px 12px rgba(124,58,237,0.5);
    }
    #send-btn:hover  { background: #6d28d9; }
    #send-btn:active { transform: scale(0.91); }
    #send-btn svg { width: 15px; height: 15px; }

    /* ─── Footer ─── */
    .footer {
      text-align: center;
      font-size: 10.5px;
      color: var(--t3);
      padding: 0 22px 13px;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    /* ─── Mobile ─── */
    @media (max-width: 500px) {
      body { padding: 0; align-items: flex-end; }
      #app {
        height: 100dvh;
        max-height: none;
        border-radius: 0;
        border: none;
        border-top: 1px solid var(--border);
      }
      .header-tags { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar">
        <img src="memoji_look.png" alt="Yash"/>
      </div>
      <div class="status-dot"></div>
    </div>
    <div class="header-info">
      <h1>Yash Chiluveru</h1>
      <p id="status-line">● Online · Ask me anything about Yash</p>
    </div>
    <div class="header-tags">
      <span class="tag">Data Eng</span>
      <span class="tag">CSK</span>
      <span class="tag">Ferrari</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-icon">
        <img src="memoji_hi.png" alt="Yash waving"/>
      </div>
      <div class="bubble" id="greeting-msg">Hey! Loading…</div>
    </div>
  </div>

  <div class="chips" id="chips">
    <button class="chip" onclick="sendQuick('What is Yash doing right now?')">What\'s he up to now?</button>
    <button class="chip" onclick="sendQuick('Who is Yash?')">Who is Yash?</button>
    <button class="chip" onclick="sendQuick('What does he do for work?')">Work &amp; career</button>
    <button class="chip" onclick="sendQuick('What are his hobbies?')">Hobbies</button>
    <button class="chip" onclick="sendQuick('What food does Yash like?')">Fav food</button>
  </div>

  <div class="input-bar">
    <input id="chat-input" type="text" placeholder="Ask anything about Yash…" autocomplete="off"/>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="footer">Powered by Claude · Built by Yash</div>
</div>

<!-- API Key Setup Screen -->
<div id="setup-screen" style="display:none;position:fixed;inset:0;background:rgba(8,8,12,0.97);backdrop-filter:blur(20px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:400px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:32px;text-align:center;">
    <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#4c1d95,#7c3aed);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:24px;">🔑</div>
    <h2 style="font-size:17px;font-weight:600;color:#f4f4f5;margin-bottom:8px;letter-spacing:-0.02em;">One-time setup</h2>
    <p style="font-size:13px;color:#a1a1aa;margin-bottom:24px;line-height:1.6;">Enter your Anthropic API key to power the chat.<br/>It stays in your browser — never uploaded anywhere.</p>
    <input id="key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off"
      style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 14px;font-family:'Inter',sans-serif;font-size:13.5px;color:#f4f4f5;outline:none;margin-bottom:12px;letter-spacing:0.02em;"/>
    <button onclick="saveKey()"
      style="width:100%;background:#7c3aed;border:none;border-radius:9px;padding:11px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 2px 12px rgba(124,58,237,0.5);">
      Start chatting
    </button>
    <p style="font-size:11px;color:#3f3f46;margin-top:16px;">Get a key at console.anthropic.com</p>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem('yash_api_key') || '';

  function saveKey() {
    const val = document.getElementById('key-input').value.trim();
    if (!val.startsWith('sk-ant-')) {
      alert('That doesn\'t look right — make sure it starts with sk-ant-');
      return;
    }
    localStorage.setItem('yash_api_key', val);
    API_KEY = val;
    document.getElementById('setup-screen').style.display = 'none';
  }

  if (!API_KEY) {
    document.getElementById('setup-screen').style.display = 'flex';
  }

  /* ── Time-aware context ── */
  function getTimeContext() {
    const now  = new Date();
    const hour = now.getHours();
    const mins = now.getMinutes();
    const isWeekend = [0, 6].includes(now.getDay());
    const timeStr = `${hour}:${String(mins).padStart(2,'0')}`;

    let activity, statusLabel;

    if (hour < 11) {
      activity    = 'He is very likely still asleep — Yash wakes up around 11am, so don\'t expect a reply anytime soon!';
      statusLabel = 'Probably asleep';
    } else if (hour < 12) {
      activity    = 'He just woke up! Probably making his first coffee of the day or figuring out breakfast.';
      statusLabel = 'Just woke up';
    } else if (hour < 14) {
      activity    = isWeekend
        ? 'Weekend lunchtime — probably cooking chicken or eggs, or ordering shawarma or kebabs.'
        : 'Lunchtime! He\'s likely cooking chicken and eggs or ordering Indian food, shawarma, or Chipotle.';
      statusLabel = 'Lunch time';
    } else if (hour < 18) {
      activity    = isWeekend
        ? 'Weekend afternoon — he\'s probably out playing cricket, watching F1 highlights, or hanging with friends.'
        : 'Working remotely — deep in data engineering: pipelines, ETL, the usual.';
      statusLabel = isWeekend ? 'Weekend mode' : 'Working';
    } else if (hour < 20) {
      activity    = 'Evening — probably at the gym or out for tea/coffee with friends.';
      statusLabel = 'Evening routine';
    } else if (hour < 23) {
      activity    = 'Night mode — winding down with F1 replays, Netflix, or just chilling with a coffee.';
      statusLabel = 'Night mode';
    } else {
      activity    = 'Past midnight — probably asleep, or pulling a late night with coffee.';
      statusLabel = 'Late night';
    }

    return { activity, statusLabel, isWeekend, hour, timeStr };
  }

  function buildSystem() {
    const ctx = getTimeContext();
    return `You are the personal AI for Yash Chiluveru. Answer questions about Yash in a natural, confident, slightly playful tone. Keep answers concise (2–4 sentences) unless more depth is asked for. Use at most one emoji per message.

About Yash:
- Full name: Yash Chiluveru, 25 years old
- From: Hyderabad, India
- Role: Data Engineer (works remotely, flexible hours)
- Education: Master's in Information Science
- Schedule: wakes around 11am, night owl

Personality: energetic, chill, coffee-obsessed, loves driving

Sports:
- Cricket fan — favorite IPL team is Chennai Super Kings (CSK)
- Huge F1 fan — supports Ferrari, loves Lewis Hamilton
- Plays cricket on weekends

Food: loves cooking chicken and eggs at home; favorites include Indian food, shawarma, Chipotle, kebabs, salads

Current time context (${ctx.timeStr}):
${ctx.activity}

Rules:
- If asked "what's Yash doing right now?" use the time context above for a realistic answer
- If you don't know something specific, say so honestly — never invent details
- Don't start replies with "Great question!" or filler phrases`;
  }

  /* ── Greeting ── */
  function initGreeting() {
    const ctx = getTimeContext();
    const { hour } = ctx;
    let msg;
    if (hour < 11)       msg = "Hey! Yash is probably still asleep right now — but I'm always online. Ask me anything about him.";
    else if (hour < 14)  msg = "Hey! Just woke up and grabbing coffee — but I'm here. Ask me anything about Yash.";
    else if (hour < 18)  msg = "Hey! Yash is likely working right now, but I can answer anything about him.";
    else if (hour < 23)  msg = "Hey! Evening vibes — Yash might be at the gym or having chai. Ask me anything.";
    else                 msg = "Hey! It's late so Yash is probably asleep — but I'm always on. Ask me anything.";

    document.getElementById('greeting-msg').textContent = msg;
    document.getElementById('status-line').textContent = `● ${ctx.statusLabel} · Ask me anything`;
  }

  /* ── Chat ── */
  const history = [];

  function safe(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  function appendMsg(role, text) {
    history.push({ role, content: text });
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const iconHtml = role === 'user'
      ? `<div class="msg-icon">👤</div>`
      : `<div class="msg-icon"><img src="memoji_look.png" alt="Yash"/></div>`;

    wrap.innerHTML = iconHtml + `<div class="bubble">${safe(text)}</div>`;

    const container = document.getElementById('messages');
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML =
      `<div class="msg-icon" style="width:30px;height:30px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,0.07);background:linear-gradient(135deg,#4c1d95,#6d28d9);flex-shrink:0">` +
      `<img src="memoji_wait.png" alt="Yash thinking" style="width:100%;height:100%;object-fit:cover;display:block"/></div>` +
      `<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    appendMsg('user', text);
    document.getElementById('chips').style.display = 'none';
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'x-api-key':     API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model:      'claude-sonnet-4-6',
          max_tokens: 400,
          system:     buildSystem(),
          messages:   history.slice(-12)
        })
      });
      const data = await res.json();
      removeTyping();
      if (data.content?.[0]?.text) {
        appendMsg('assistant', data.content[0].text);
      } else {
        const errMsg = data.error?.message ?? JSON.stringify(data);
        appendMsg('assistant', 'API error: ' + errMsg);
      }
    } catch (e) {
      removeTyping();
      appendMsg('assistant', 'Connection error: ' + e.message);
    }
  }

  function sendQuick(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
  }

  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  initGreeting();
</script>
</body>
</html>
